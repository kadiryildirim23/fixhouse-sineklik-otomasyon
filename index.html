<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix House - Üst Düzey Fabrikasyon ERP v5.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #e65100; --secondary: #263238; --bg: #f1f3f4; --surface: #ffffff; --text: #2c3e50; --border: #b0bec5; --success: #1b5e20; --accent: #01579b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        
        nav { display: flex; background: var(--secondary); padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; gap: 12px; border-bottom: 4px solid var(--primary); align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        nav .logo { color: white; font-weight: 800; font-size: 22px; letter-spacing: 1px; margin-right: 20px; }
        nav button { background: rgba(255,255,255,0.08); color: white; border: none; padding: 12px 22px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px; transition: all 0.2s ease; }
        nav button:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }
        nav button.active { background: var(--primary); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        
        .status-bar-container { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        #live-clock { color: #ffffff; font-size: 15px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        #connection-status { color: #ffcc80; font-size: 12px; font-weight: bold; }
        
        .tab-content { display: none; } .tab-content.active { display: block; }
        .grid-layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 25px; }
        @media (max-width: 1100px) { .grid-layout { grid-template-columns: 1fr; } }
        
        .card { background: var(--surface); padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid var(--border); margin-bottom: 25px; }
        h2 { color: var(--secondary); font-size: 18px; margin-bottom: 18px; border-bottom: 3px solid #cfd8dc; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        
        .row-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #455a64; text-transform: uppercase; }
        input, select { padding: 12px 14px; border: 2px solid var(--border); border-radius: 6px; font-size: 15px; font-weight: 600; color: #2c3e50; outline: none; background: #ffffff; }
        input:focus, select:focus { border-color: var(--primary); background: #fffde7; }
        
        .price-display-bar { background: #efebe9; padding: 12px 15px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; color: #4e342e; border-left: 5px solid var(--primary); }
        .price-display-bar b { font-size: 15px; color: #d84315; }
        
        button.main-btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 6px; font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; text-transform: uppercase; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        button.main-btn:hover { background: #bf360c; }
        button.action-btn { background: #455a64; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 700; }
        button.action-btn:hover { background: #37474f; }
        button.print-btn { background: #00897b; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: 700; font-size: 13px; }
        
        .sepet-table, .settings-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; font-weight: 600; }
        .sepet-table th, .settings-table th { background: var(--secondary); color: white; padding: 10px; text-transform: uppercase; font-size: 11px; text-align: left; }
        .sepet-table td, .settings-table td { padding: 10px; border-bottom: 2px solid #eceff1; background: #ffffff; }
        .sepet-table tr:hover td, .settings-table tr:hover td { background: #f5f5f5; }
        
        .order-pool-list { list-style: none; }
        .pool-item { background: white; border: 1px solid var(--border); padding: 18px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--secondary); box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .pool-item h3 { font-size: 16px; color: var(--secondary); margin-bottom: 8px; border-bottom: 1px solid #efebe9; padding-bottom: 4px; }
        .pool-item ul { padding-left: 20px; font-size: 14px; margin: 10px 0; color: #37474f; }
        
        .settings-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }
        .settings-sidebar { display: flex; flex-direction: column; gap: 8px; border-right: 1px solid var(--border); padding-right: 15px; }
        .settings-sidebar button { background: none; color: var(--text); border: none; text-align: left; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px; }
        .settings-sidebar button.active { background: #eceff1; color: var(--primary); }
        .settings-pane { display: none; } .settings-pane.active { display: block; }
        
        .finance-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .fin-card { background: #eceff1; padding: 15px; border-radius: 6px; border-left: 4px solid var(--secondary); font-weight: bold; }
        .fin-card.plus { border-left-color: var(--success); background: #e8f5e9; }
        .fin-card.minus { border-left-color: #d32f2f; background: #ffebee; }
        
        @media print { .no-print, nav, button { display: none !important; } body { background: white; color: black; padding: 0; } .card { box-shadow: none; border: none; } }
    </style>
</head>

    <button class="nav-link" onclick="switchTab('active-pool-tab', this)">📋 Canlı Üretim Havuzu</button>
    <button class="nav-link" onclick="switchTab('potential-tab', this)">🔮 Potansiyel Müşteriler</button>
    <button class="nav-link" onclick="switchTab('archive-tab', this)">🗄️ Akıllı Arşiv</button>
    <button class="nav-link" onclick="switchTab('settings-tab', this)" style="background:#37474f;">⚙️ Ayarlar</button>
    
    <div class="status-bar-container">
        <div id="live-clock">00:00:00</div>
        <div id="connection-status">● Buluta Bağlanıyor...</div>
    </div>
</nav>
